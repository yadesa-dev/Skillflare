<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - SkillFlare</title>
</head>
<body style="font-family: Arial; background:#020617; color:white; text-align:center; padding:50px;">

<h1>Welcome to Dashboard 🚀</h1>
<p id="userEmail"></p>

<button onclick="logout()">Logout</button>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDOjtLKJMgYzIyIzeRiC5mSQhmDLysUY2o",
  authDomain: "skillflare-7337.firebaseapp.com",
  projectId: "skillflare-7337",
  storageBucket: "skillflare-7337.appspot.com",
  messagingSenderId: "483200856160",
  appId: "1:483200856160:web:6eb1f4ad5f29e2135c5305"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// show user
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("userEmail").innerText = user.email;
  } else {
    window.location.href = "index.html"; // not logged in → go back
  }
});

// logout
function logout() {
  auth.signOut().then(() => {
    console.log("Logged out ✅");
    window.location.href = "index.html";
  }).catch((error) => {
    console.error(error);
  });
}
</script>

</body>
</html>
